[pytest]
# --alluredir is intentionally omitted here.
# conftest.py::pytest_configure generates a unique timestamped directory
# (allure-results/run_YYYYMMDD_HHMMSS) at startup and passes it to
# allure-pytest dynamically, so hardcoding a path here would conflict.
# To override the base directory: pytest --alluredir=my-base-dir
addopts = -n auto

# Live log output
log_cli           = true
log_cli_level     = INFO
log_cli_format    = [%(browser)s][%(worker)s][%(levelname)-8s] %(name)s: %(message)s

# Captured log stored per test in the pytest report
log_level         = DEBUG
log_format        = [%(browser)s][%(worker)s][%(levelname)-8s] %(name)s: %(message)s
